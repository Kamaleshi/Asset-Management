version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 5000
      JWT_SECRET: change-me-for-production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGINS: http://localhost:3000,http://localhost
    ports:
      - "5000:5000"
    volumes:
      - ./backend/database:/app/database
      - ./backend/uploads:/app/backend/uploads

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "3000:80"
